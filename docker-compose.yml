services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trafficguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: ${POSTGRES_DB:-trafficguard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trafficguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Passerelle de streaming vidéo : proxifie les flux RTSP des caméras en HLS
  # lisible dans le navigateur, avec enregistrement optionnel.
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      - MTX_API=yes
      - MTX_APIADDRESS=:9997
      - MTX_HLS=yes
      - MTX_HLSADDRESS=:8888
      - MTX_HLSALLOWORIGIN=*
    ports:
      - "8554:8554" # RTSP
      - "8888:8888" # HLS (navigateur)
      - "9997:9997" # API de configuration
    volumes:
      - mediamtx_recordings:/recordings

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ml:
    build:
      context: ./apps/ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - API_URL=http://api:3001
      - SERVICE_API_KEY=${SERVICE_API_KEY:-dev-service-key}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # DATABASE_URL vient du .env (Supabase)
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml:8000
      - S3_ENDPOINT=http://minio:9000
    ports:
      - "4001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4001
        NEXT_PUBLIC_WS_URL: ws://localhost:4001
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 400 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mediamtx_recordings:
