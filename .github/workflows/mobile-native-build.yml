name: mobile-native-build

# Build natif Android + smoke test sur émulateur.
#
# Ce job tourne sur un runner GitHub (qui dispose de KVM et de l'accès à
# dl.google.com / api.expo.dev) et exécute donc ce qui est impossible dans
# l'environnement de dev restreint : la compilation réelle des modules natifs
# (react-native-webrtc, ML Kit) et le lancement de l'app sur un émulateur.

on:
  push:
    branches: [claude/plate-recognition-video-stream-sd9jiu]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-native-build.yml'
  workflow_dispatch:

concurrency:
  group: mobile-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (Android natif + config plugins)
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK (signé avec le keystore debug)
        working-directory: apps/mobile/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trafficguard-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Smoke test sur émulateur
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            maestro test apps/mobile/.maestro/smoke.yaml

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-output
          path: |
            ~/.maestro/tests/**
          if-no-files-found: ignore
