# Maintient l'API Render (offre gratuite) éveillée : Render met le service en
# veille après 15 min sans trafic (~40 s de réveil ensuite, ce qui ferait
# expirer le login mobile). Ce ping toutes les 10 min évite la veille.
# 100 % gratuit sur un dépôt public. Déclenchable aussi manuellement.
name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 60 https://trafficguard-api-ftqe.onrender.com/health \
            && echo "OK" || echo "ping échoué (réveil en cours ?)"
